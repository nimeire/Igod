<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>iGOD - Cozinha</title>
    <link rel="stylesheet" th:href="@{/css/cozinha.css}">
    <meta http-equiv="refresh" content="5">
</head>
<body>
<div class="container">

    <header class="topo">
        <div class="logo"> iGOD</div>
        <div class="estacao">
            Estação <span th:text="${estacaoId}"></span>
        </div>
        <button class="botao-resetar" type="button" onclick="resetarEstacao()">
            🔄 Resetar
        </button>
    </header>

    <main class="conteudo">

        <div class="card-pedido" th:if="${pedido != null}">

            <div class="status"> EM PREPARO</div>

            <div class="badge-encomenda"
                 th:if="${pedido.tipo != null and pedido.tipo.name() == 'ENCOMENDA'}">
                 ENCOMENDA
            </div>

            <div class="titulo">Pedido Atual</div>

            <div class="senha">
                #<span th:text="${#numbers.formatInteger(pedido.senha, 3)}"></span>
            </div>

            <div class="responsavel">
                👤 <span th:text="${pedido.nomeResponsavel}"></span>
            </div>

            <div class="observacoes"
                 th:if="${pedido.observacoes != null and !pedido.observacoes.isEmpty()}">
                OBSERVAÇÃO: <br>
                <span th:text="${pedido.observacoes}"></span>
            </div>

            <div th:each="item : ${pedido.itens}" class="item">
                <span class="quantidade" th:text="${item.quantidade + 'x'}"></span>
                <span class="produto" th:text="${item.produto.nome}"></span>
            </div>
            <form
                    th:action="@{'/cozinha/' + ${estacaoId} + '/pedido/' + ${pedido.id} + '/feito'}"
                    method="post"
                    onsubmit="return finalizarPedido(this)">
                <button class="botao-feito" type="submit">
                    ✓ PEDIDO FEITO
                </button>
            </form>

            <div class="rodape">
                Próximo pedido será carregado automaticamente
            </div>

        </div>

        <div class="card-pedido vazio" th:if="${pedido == null}">
            <h2>Nenhum pedido no momento</h2>
            <p>Aguardando próximo pedido...</p>
        </div>

    </main>
</div>

<script>
    function finalizarPedido(form) {
        const botao = form.querySelector("button");
        botao.disabled = true;
        botao.innerText = "FINALIZANDO...";
        setTimeout(() => {
            form.submit();
        }, 1000);
        return false;
    }

    function resetarEstacao() {
        const estacaoId = /*[[${estacaoId}]]*/ null;

        if (confirm("Tem certeza? Isso vai liberar a estação mesmo com pedido em andamento.")) {
            fetch(`/estacoes/${estacaoId}/liberar`, { method: 'PATCH' })
                .then(() => location.reload());
        }
    }
</script>
</body>
</html>
